tosca_definitions_version: dell_1_1

description: >
  Utility blueprint that deploys a single Virtual Machine on a NativeEdge Endpoint
  using cloud-init. Called by the parent blueprint via ServiceComponent.

imports:
  - dell/types/types.yaml
  - vm/inputs.yaml
  - vm/outputs.yaml
  - vm/blueprint.yaml

labels:
  csys-obj-type:
    values:
      - environment

blueprint_labels:
  csys-blueprint-type:
    values:
      - utility
  env:
    values:
      - NED
