imports:
  - plugin:edge-plugin?version= >=3.3.17.0,<4.0.0.0
  - plugin:utilities-plugin?version= >=3.1.4.0,<4.0.0.0
  - plugin:ansible-plugin?version= >=4.1.8.0,<5.0.0.0

dsl_definitions:

  ansible_env_vars: &ansible_default_env_vars
    ANSIBLE_HOST_KEY_CHECKING: "False"
    ANSIBLE_INVALID_TASK_ATTRIBUTE_FAILED: "False"
    ANSIBLE_STDOUT_CALLBACK: minimal
    ANSIBLE_DEPRECATION_WARNINGS: "False"
    ANSIBLE_DISPLAY_OK_HOSTS: "False"
    ANSIBLE_DISPLAY_SKIPPED_HOSTS: "False"

  ansible_common_properties: &ansible_common_properties
    timeout: 30
    debug_level: 0
    number_of_attempts: 10
    # log_stdout=false avoids the slowdown caused by streaming
    # full ansible stdout through the orchestrator event log
    # (per plan owner feedback 2026-05-16). Errors and the final
    # task summary still surface via the playbook return code +
    # ansible's minimal stdout callback; failures are visible in
    # event log without the verbose chatter.
    log_stdout: false
    sensitive_keys:
      - ansible_host
      - ansible_port
      - ansible_user
      - ansible_ssh_private_key_file
      - ansible_ssh_common_args

  ansible_host_common: &ansible_host_common
    ansible_user: { get_input: vm_user_name }
    ansible_become: True
    ansible_become_user: { get_input: vm_user_name }
    ansible_ssh_common_args: -o StrictHostKeyChecking=no -o ControlPersist=yes
    ansible_ssh_private_key_file:
      get_secret: { get_input: ssh_private_key_secret }

node_templates:

  cloudinit:
    type: dell.nodes.CloudInit.CloudConfig
    properties:
      resource_config: { get_input: cloudinit }

  proxy_resolver:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: vm/scripts/get_proxy.py
          executor: central_deployment_agent
          inputs:
            service_tag: { get_input: service_tag }

  format_serial_ports:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: vm/scripts/prepare_serial_ports.py
          executor: central_deployment_agent
          inputs:
            serial_port: { get_input: serial_port }

  vm:
    type: dell.nodes.nativeedge.template.NativeEdgeVM
    properties:
      vm_config:
        location: { get_input: service_tag }
        name: { get_input: name }
        image: { get_input: image }
        os_type: { get_input: os_type }
        resource_constraints:
          cpu: { get_input: cpu }
          memory: { get_input: memory }
          storage: { get_input: storage }
          disk: { get_input: disk }
          controller: { get_input: disk_controller }
        hardware_options:
          vTPM: { get_input: hardware_options.vTPM }
          secure_boot: { get_input: hardware_options.secure_boot }
          firmware_type: { get_input: hardware_options.firmware_type }
        enable_management: { get_input: enable_management }
        network_settings: { get_input: network_settings }
        ports:
          usb: { get_input: usb }
          serial_port: { get_attribute: [format_serial_ports, serial_ports_list] }
          gpu: { get_input: gpu }
          video: { get_input: video }
          pcie: { get_input: pcie }
        cloudinit: { get_attribute: [cloudinit, cloud_config] }
        iso_files: { get_input: iso_files }
        boot_order: { get_input: boot_order }
        additional_disks: { get_input: additional_disks }
    relationships:
       - type: dell.relationships.depends_on
         target: cloudinit
       - type: dell.relationships.depends_on
         target: format_serial_ports

  vm_info:
    type: dell.nodes.ansible.Executor
    properties:
      <<: *ansible_common_properties
      playbook_path: vm/ansible/get_vm_info.yaml
      inventory_proxy_settings:
        ssh:
          ip: { get_attribute: [vm, vm_details, name] }
          port: 22
      sources:
        all:
          hosts:
            vm:
              <<: *ansible_host_common
              ansible_host: { get_attribute: [SELF, inventory_proxy_settings, ssh, ip] }
              ansible_port: { get_attribute: [SELF, inventory_proxy_settings, ssh, port] }
      ansible_env_vars:
        <<: *ansible_default_env_vars
      run_data:
        node_instance_id: { get_attribute: [SELF, node_instance_id] }
    interfaces:
      dell.interfaces.lifecycle:
        poststart:
          implementation: vm/scripts/get_vm_info.py
          executor: central_deployment_agent
    relationships:
       - type: dell.relationships.depends_on
         target: vm
       - type: dell.relationships.depends_on
         target: proxy_resolver
